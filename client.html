<script>
  const STORE_KEY = 'suko_campaign_id';

  const state = {
    campaignId: '',
    busy: false,
    campaigns: []
  };

  document.addEventListener('DOMContentLoaded', initApp);

  function initApp() {
    bindUi();
    loadBootstrap();
  }

  function bindUi() {
    document.getElementById('createCampaignBtn').addEventListener('click', onCreateCampaign);
    document.getElementById('loadCampaignBtn').addEventListener('click', onLoadCampaign);
    document.getElementById('sendBtn').addEventListener('click', onSend);

    document.getElementById('userInput').addEventListener('keydown', function (ev) {
      if (ev.key === 'Enter' && !ev.shiftKey) {
        ev.preventDefault();
        onSend();
      }
    });

    Array.prototype.forEach.call(document.querySelectorAll('.chip'), function (btn) {
      btn.addEventListener('click', function () {
        const cmd = btn.getAttribute('data-command');
        if (!cmd) return;
        document.getElementById('userInput').value = cmd;
        onSend();
      });
    });
  }

  function loadBootstrap() {
    clearError();
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.ok) {
          showError((res && res.error) || 'No pude cargar campañas.');
          reportClientError('loadBootstrap.result', (res && res.error) || 'Respuesta inválida al cargar campañas.');
          return;
        }
        state.campaigns = res.campaigns || [];
        renderCampaignSelect();
        const saved = localStorage.getItem(STORE_KEY);
        if (isValidCampaignId(saved) && state.campaigns.some(function (c) { return c.campaign_id === saved; })) {
          state.campaignId = saved;
          document.getElementById('campaignSelect').value = saved;
          loadCampaign(saved);
        }
      })
      .withFailureHandler(function (err) {
        const message = extractError(err);
        showError('No se pudo conectar con Apps Script.');
        reportClientError('loadBootstrap.failure', message);
      })
      .getBootstrapData();
  }

  function renderCampaignSelect() {
    const select = document.getElementById('campaignSelect');
    select.innerHTML = '';

    if (!state.campaigns.length) {
      const empty = document.createElement('option');
      empty.value = '';
      empty.textContent = 'Sin campañas';
      select.appendChild(empty);
      return;
    }

    state.campaigns.forEach(function (c) {
      const op = document.createElement('option');
      op.value = c.campaign_id;
      op.textContent = c.character_name + ' (' + c.player_name + ')';
      select.appendChild(op);
    });
  }

  function onCreateCampaign() {
    if (state.busy) return;

    const playerName = (document.getElementById('playerName').value || '').trim();
    const characterName = (document.getElementById('characterName').value || '').trim();

    if (!playerName || !characterName) {
      showError('Escribe nombre de jugador y personaje.');
      reportClientError('createCampaign.validation', 'Faltan nombre de jugador o personaje.');
      return;
    }

    setBusy(true);
    clearError();

    google.script.run
      .withSuccessHandler(function (res) {
        setBusy(false);
        if (!res || !res.ok) {
          showError('No pude crear la campaña.');
          return;
        }
        state.campaignId = res.campaign_id;
        localStorage.setItem(STORE_KEY, res.campaign_id);
        document.getElementById('playerName').value = '';
        document.getElementById('characterName').value = '';
        appendMessage('assistant', 'Campaña creada. Iniciando escena...');
        loadBootstrap();
        loadCampaign(res.campaign_id);
      })
      .withFailureHandler(function (err) {
        setBusy(false);
        const message = extractError(err);
        showError(message);
        reportClientError('createCampaign.failure', message);
      })
      .createCampaign(playerName, characterName);
  }

  function onLoadCampaign() {
    const id = document.getElementById('campaignSelect').value;
    if (!id) {
      showError('Selecciona una campaña.');
      reportClientError('loadCampaign.validation', 'Intento de carga sin campaign_id.');
      return;
    }
    loadCampaign(id);
  }

  function loadCampaign(campaignId) {
    if (!isValidCampaignId(campaignId)) {
      showError('campaign_id inválido.');
      reportClientError('loadCampaign.validation', 'campaign_id inválido: ' + String(campaignId || ''));
      return;
    }
    setBusy(true);
    clearError();

    google.script.run
      .withSuccessHandler(function (res) {
        setBusy(false);
        if (!res || !res.ok) {
          showError((res && res.error) || 'No pude cargar la campaña.');
          reportClientError('loadCampaign.result', (res && res.error) || 'Respuesta inválida al cargar campaña.', campaignId);
          return;
        }
        state.campaignId = campaignId;
        localStorage.setItem(STORE_KEY, campaignId);
        renderMessages(res.messages || []);
      })
      .withFailureHandler(function (err) {
        setBusy(false);
        const message = extractError(err);
        showError(message);
        reportClientError('loadCampaign.failure', message, campaignId);
      })
      .getCampaignData(campaignId);
  }

  function onSend() {
    if (state.busy) return;
    if (!isValidCampaignId(state.campaignId)) {
      showError('Primero crea o carga una campaña.');
      reportClientError('send.validation', 'No hay campaña activa válida.');
      return;
    }

    const input = document.getElementById('userInput');
    const text = (input.value || '').trim();
    if (!text) return;

    input.value = '';
    appendMessage('user', text);

    setBusy(true);
    clearError();

    google.script.run
      .withSuccessHandler(function (res) {
        setBusy(false);
        if (!res || !res.ok) {
          showError((res && res.error) || 'No hubo respuesta del narrador.');
          return;
        }
        appendMessage('assistant', res.narration || '...');
      })
      .withFailureHandler(function (err) {
        setBusy(false);
        const message = extractError(err);
        showError(message);
        reportClientError('send.failure', message, state.campaignId);
      })
      .handlePlayerMessage(state.campaignId, text);
  }

  function renderMessages(messages) {
    const box = document.getElementById('chatBox');
    box.innerHTML = '';
    messages.forEach(function (m) {
      appendMessage(m.role === 'user' ? 'user' : 'assistant', String(m.content || ''), false);
    });
    scrollChatToBottom();
  }

  function appendMessage(role, text, autoScroll) {
    const box = document.getElementById('chatBox');
    const msg = document.createElement('div');
    msg.className = 'msg ' + (role === 'user' ? 'user' : 'assistant');
    msg.textContent = sanitizeClientText(text || '');
    box.appendChild(msg);
    if (autoScroll !== false) {
      scrollChatToBottom();
    }
  }

  function scrollChatToBottom() {
    const box = document.getElementById('chatBox');
    box.scrollTop = box.scrollHeight;
  }

  function setBusy(isBusy) {
    state.busy = !!isBusy;
    document.getElementById('sendBtn').disabled = state.busy;
    document.getElementById('createCampaignBtn').disabled = state.busy;
    document.getElementById('loadCampaignBtn').disabled = state.busy;
    document.getElementById('sendBtn').textContent = state.busy ? 'Pensando...' : 'Enviar';
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg || 'Ocurrió un error inesperado.';
    box.classList.remove('hidden');
  }

  function clearError() {
    const box = document.getElementById('errorBox');
    box.textContent = '';
    box.classList.add('hidden');
  }

  function sanitizeClientText(text) {
    return String(text)
      .replace(/[\u0000-\u001F\u007F]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function extractError(err) {
    if (!err) return 'Error desconocido.';
    if (typeof err === 'string') return err;
    if (err.message) return String(err.message);
    return 'Error inesperado al procesar la solicitud.';
  }

  function reportClientError(context, message, campaignId) {
    try {
      google.script.run.logClientError(context, message, campaignId || state.campaignId || '');
    } catch (err) {
      console.warn('No se pudo registrar error cliente:', err);
    }
  }

  function isValidCampaignId(id) {
    return /^cmp_[a-zA-Z0-9]{8,40}$/.test(String(id || '').trim());
  }
</script>

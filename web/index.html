<!DOCTYPE html>
<html>
<head>
  <base target="_top" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SUKO RPG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="app-shell">
    <header class="app-header">
      <h1>SUKO RPG</h1>
      <p>Narrativa viva. Consecuencias persistentes. Tu historia se guarda sola.</p>
    </header>

    <!-- Controles de campaña (oculto en modo juego) -->
    <section id="campaignPanel" class="campaign-panel card">
      <div class="campaign-row">
        <label for="campaignSelect">Campaña</label>
        <select id="campaignSelect"></select>
        <button id="loadCampaignBtn" class="btn secondary">Cargar</button>
      </div>
      <div class="campaign-create">
        <input id="playerName" type="text" placeholder="Nombre del jugador" maxlength="60" />
        <input id="characterName" type="text" placeholder="Nombre del personaje" maxlength="60" />
        <button id="createCampaignBtn" class="btn">Nueva partida</button>
      </div>
    </section>

    <!-- Layout principal: sidebar (desktop) + contenido -->
    <div class="main-layout">
      <!-- Sidebar: Inventario, Mapa, Estado (oculto en móvil, tabs en móvil) -->
      <aside id="sidebar" class="sidebar">
        <!-- Tabs en móvil -->
        <div class="sidebar-tabs">
          <button class="tab-btn active" data-tab="estado">Estado</button>
          <button class="tab-btn" data-tab="presion">Presión</button>
          <button class="tab-btn" data-tab="inventario">Inventario</button>
          <button class="tab-btn" data-tab="mapa">Mapa</button>
        </div>

        <!-- Panel: Estado -->
        <div id="estadoPanel" class="sidebar-panel active">
          <h3>Estado Actual</h3>
          <div class="state-info">
            <div class="state-row">
              <span class="state-label">Ubicación:</span>
              <span id="statLocation" class="state-value">-</span>
            </div>
            <div class="state-row">
              <span class="state-label">Región:</span>
              <span id="statRegion" class="state-value">-</span>
            </div>
            <div class="state-row">
              <span class="state-label">Dinero:</span>
              <span id="statMoney" class="state-value">-</span>
            </div>
            <div class="state-row">
              <span class="state-label">Fatiga:</span>
              <span id="statFatigue" class="state-value">-</span>
            </div>
            <div id="statNPCs" class="state-section">
              <div class="state-label">NPCs presentes:</div>
              <div id="npcList" class="npc-list"></div>
            </div>
            <div id="statItems" class="state-section">
              <div class="state-label">Items disponibles:</div>
              <div id="floorItems" class="items-list"></div>
            </div>
          </div>
          <button id="estadoBtn" class="btn secondary small" style="margin-top: 0.5rem;">Refrescar estado</button>
        </div>

        <!-- Panel: Presión Narrativa -->
        <div id="presionPanel" class="sidebar-panel">
          <h3>⚡ Presión Narrativa</h3>
          <div id="pressureList" class="pressure-list">
            <p class="placeholder">Sin presión activa</p>
          </div>
          <div id="factionList" class="faction-list" style="margin-top: 1rem;">
            <h4 style="margin: 0.5rem 0;">Facciones</h4>
            <p class="placeholder">Cargando facciones...</p>
          </div>
          <button id="presionBtn" class="btn secondary small" style="margin-top: 0.5rem;">Refrescar</button>
        </div>

        <!-- Panel: Inventario -->
        <div id="inventarioPanel" class="sidebar-panel">
          <h3>Inventario</h3>
          <div id="inventoryList" class="inventory-list"></div>
          <button id="inventarioBtn" class="btn secondary small" style="margin-top: 0.5rem;">Ver inventario</button>
        </div>

        <!-- Panel: Mapa -->
        <div id="mapaPanel" class="sidebar-panel">
          <h3>Mapa</h3>
          <div id="locationList" class="location-list"></div>
          <button id="mapaBtn" class="btn secondary small" style="margin-top: 0.5rem;">Ver mapa</button>
        </div>
      </aside>

      <!-- Chat principal -->
      <section class="chat-section">
        <div class="chat card">
          <div id="chatBox" class="chat-box" aria-live="polite"></div>
          <div id="errorBox" class="error-box hidden"></div>

          <!-- Barra de comandos combinables -->
          <div class="commands-bar">
            <div class="commands-group">
              <span class="commands-label">Acción:</span>
              <button class="cmd-btn" data-cmd="/hacer">Hacer</button>
              <button class="cmd-btn" data-cmd="/decir">Decir</button>
              <button class="cmd-btn" data-cmd="/examinar">Examinar</button>
              <button class="cmd-btn" data-cmd="/atacar">Atacar</button>
              <button class="cmd-btn" data-cmd="/usar">Usar</button>
              <button class="cmd-btn" data-cmd="/hablar">Hablar</button>
              <button class="cmd-btn" data-cmd="/buscar">Buscar</button>
            </div>
            <div class="commands-group">
              <span class="commands-label">Avanzado:</span>
              <button class="cmd-btn advanced" data-cmd="/combate">⚔️ Combate</button>
              <button class="cmd-btn advanced" data-cmd="/negociar">💬 Negociar</button>
              <button class="cmd-btn advanced" data-cmd="/estudiar">📖 Estudiar</button>
              <button class="cmd-btn advanced" data-cmd="/viajar">🛣️ Viajar</button>
              <button class="cmd-btn advanced" data-cmd="/investigar">🔍 Investigar</button>
            </div>
            <div class="commands-group">
              <span class="commands-label">Info:</span>
              <button class="cmd-btn info" data-cmd="/estado">Estado</button>
              <button class="cmd-btn info" data-cmd="/inventario">Inventario</button>
              <button class="cmd-btn info" data-cmd="/mapa">Mapa</button>
            </div>
          </div>

          <div class="input-row">
            <input id="userInput" type="text" placeholder="¿Qué haces?" maxlength="1200" />
            <button id="sendBtn" class="btn">Enviar</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="client.js"></script>
</body>
</html>
